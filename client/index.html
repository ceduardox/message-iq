<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IQ" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="IQ - Inbox inteligente de WhatsApp Business con IA para ventas y soporte." />
    <meta name="keywords" content="WhatsApp Business, Inbox, CRM, Mensajes, IA, Chatbot, Automatizacion, IQExcelencia" />
    <meta name="author" content="IQExcelencia" />
    <link rel="canonical" href="https://iqexcelencia.com/" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="IQ" />
    <meta property="og:description" content="IQ - Inbox inteligente de WhatsApp Business con IA para ventas y soporte." />
    <meta property="og:image" content="https://iqexcelencia.com/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iqexcelencia.com/" />
    <meta property="og:site_name" content="IQ" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IQ" />
    <meta name="twitter:description" content="IQ - Inbox inteligente de WhatsApp Business con IA para ventas y soporte." />
    <meta name="twitter:image" content="https://iqexcelencia.com/icon-512.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>IQ</title>
    
    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      #splash{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
      #splash.hide{opacity:0;pointer-events:none}
      html.fast-conversation-launch #splash{opacity:0;pointer-events:none;transition:none}
      #splash .logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#10b981,#06b6d4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(16,185,129,.4);animation:pulse-s 1.5s infinite}
      #splash .logo svg{width:28px;height:28px;color:#fff}
      #splash .title{margin-top:16px;font:700 20px Inter,sans-serif;color:#fff}
      #splash .title span{background:linear-gradient(90deg,#34d399,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
      @keyframes pulse-s{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    </style>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var hasConversationId = params.has("conversationId");
          if (hasConversationId) {
            document.documentElement.classList.add("fast-conversation-launch");
            window.__FAST_CONVERSATION_LAUNCH__ = true;
          } else {
            window.__FAST_CONVERSATION_LAUNCH__ = false;
          }
        } catch (_error) {
          window.__FAST_CONVERSATION_LAUNCH__ = false;
        }
      })();
    </script>
  </head>
  <body>
    <div id="splash">
      <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
      <div class="title"><span>IQ</span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // OneSignal initialization with full configuration
      const configuredOneSignalAppId = "%VITE_ONESIGNAL_APP_ID%";
      let oneSignalAppId =
        configuredOneSignalAppId && configuredOneSignalAppId !== "%VITE_ONESIGNAL_APP_ID%"
          ? configuredOneSignalAppId
          : "";

      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.oneSignalReady = false;
      window.oneSignalClient = null;
      window.oneSignalInitError = null;
      window.oneSignalInitPromise = null;
      window.oneSignalAppId = oneSignalAppId || null;

      async function resolveOneSignalAppId() {
        if (oneSignalAppId) return oneSignalAppId;
        try {
          const response = await fetch("/api/public-config", {
            credentials: "same-origin",
            cache: "no-store",
          });
          if (!response.ok) return "";
          const config = await response.json();
          if (config?.oneSignalAppId && typeof config.oneSignalAppId === "string") {
            oneSignalAppId = config.oneSignalAppId;
            window.oneSignalAppId = oneSignalAppId;
            return oneSignalAppId;
          }
        } catch (error) {
          console.error("[OneSignal] Failed to fetch public config:", error);
        }
        return "";
      }

      function initOneSignalClient() {
        if (window.oneSignalInitPromise) return window.oneSignalInitPromise;
        window.oneSignalInitPromise = (async function () {
          const resolvedAppId = await resolveOneSignalAppId();
          if (!resolvedAppId) {
            window.oneSignalReady = false;
            window.oneSignalInitError = "Missing OneSignal App ID";
            return false;
          }

          return new Promise((resolve) => {
            window.OneSignalDeferred.push(async function(OneSignal) {
              try {
                await OneSignal.init({
                  appId: resolvedAppId,
                  allowLocalhostAsSecureOrigin: true,
                  serviceWorkerPath: "/OneSignalSDKWorker.js?v=20260317-1",
                  serviceWorkerParam: { scope: "/" },
                  notifyButton: {
                    enable: false
                  }
                });
                
                window.oneSignalClient = OneSignal;
                window.oneSignalReady = true;
                window.oneSignalInitError = null;
                console.log("[OneSignal] SDK initialized successfully. App ID:", resolvedAppId);
                
                const permission = OneSignal.Notifications.permission;
                const subscribed = OneSignal.User.PushSubscription.optedIn;
                console.log("[OneSignal] Current status - Permission:", permission, "Subscribed:", subscribed);
                resolve(true);
              } catch (error) {
                window.oneSignalReady = false;
                window.oneSignalInitError = error?.message || "OneSignal init failed";
                console.error("[OneSignal] Init error:", error);
                resolve(false);
              }
            });
          });
        })();
        return window.oneSignalInitPromise;
      }

      initOneSignalClient();
      
      // Expose function to manually trigger subscription
      window.subscribeToNotifications = async function() {
        console.log("[OneSignal] Subscribe called, ready:", window.oneSignalReady);
        if (!window.oneSignalReady) {
          const initPromise = initOneSignalClient();
          await Promise.race([
            initPromise,
            new Promise((resolve) => setTimeout(() => resolve(false), 8000)),
          ]);
        }

        const OneSignal = window.oneSignalClient;
        
        if (!window.oneSignalReady || !OneSignal) {
          const reason = window.oneSignalInitError || "OneSignal not ready yet";
          return { success: false, reason };
        }
        
        try {
          // First check if already subscribed
          const currentStatus = OneSignal.User.PushSubscription.optedIn;
          console.log("[OneSignal] Current optedIn:", currentStatus);
          
          if (currentStatus) {
            return { success: true, subscribed: true, message: "Already subscribed" };
          }
          
          // Request permission - this triggers the native browser popup
          console.log("[OneSignal] Requesting permission...");
          const granted = await OneSignal.Notifications.requestPermission();
          console.log("[OneSignal] Permission granted:", granted);
          
          if (granted) {
            // Opt in to push
            await OneSignal.User.PushSubscription.optIn();
            console.log("[OneSignal] Opted in successfully");
            return { success: true, subscribed: true };
          } else {
            return { success: false, reason: "Permission denied by user" };
          }
        } catch (error) {
          console.error("[OneSignal] Subscribe error:", error);
          return { success: false, reason: error.message || "Unknown error" };
        }
      };
      
      // Check subscription status
      window.getNotificationStatus = function() {
        const OneSignal = window.oneSignalClient;
        if (!window.oneSignalReady || !OneSignal) {
          return { ready: false, permission: false, subscribed: false, error: window.oneSignalInitError || null };
        }
        return {
          ready: true,
          permission: OneSignal.Notifications.permission,
          subscribed: OneSignal.User.PushSubscription.optedIn
        };
      };
    </script>
  </body>
</html>
